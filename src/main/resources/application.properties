spring.application.name=chatapp-backend

# RDS
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:chatappuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# FILE UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# S3
app.s3.bucket=${S3_BUCKET:local-bucket}

# COGNITO
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI}